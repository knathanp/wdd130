<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        header {
            display: grid;
            grid-template-columns: 1fr;
            justify-items: center;
            align-items: center;
        }
        header img {
            grid-column: 1/2;
            grid-row: 1/5;
        }
        header h1 {
            grid-column: 1/2;
            grid-row: 2/3;
        }

        header h2 {
            grid-column: 1/2;
            grid-row: 3/4;
        }
    </style>
</head>
<body>
    
    <header>
        <img src="https://picsum.photos/800/200" alt="">
        <h1>Daily Feed</h1>
        <h2>Scripture a Day</h2>
    </header>

</body>
</html>
